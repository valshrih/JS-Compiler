<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS IDE with ESLint & Prettier</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="compiler-container">
        <div class="editor-section">
            <div class="controls">
                <span class="brand">JavaScript IDE</span>
                <div>
                    <button id="format-btn" class="secondary-btn">Format (Prettier)</button>
                    <button id="run-btn">Run Code</button>
                </div>
            </div>
            <textarea id="editor-container"></textarea>
        </div>

        <div class="output-section">
            <h3>Console Output:</h3>
            <pre id="output-box">Your console.log outputs will appear here...</pre>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/javascript-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/eslint-linter-browserify@8.57.0/linter.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prettier/2.8.8/standalone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prettier/2.8.8/parser-babel.js"></script>

    <script src="script.js"></script>
</body>
</html>
